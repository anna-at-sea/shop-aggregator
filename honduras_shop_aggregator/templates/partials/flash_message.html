{% if messages %}
  <div class="container-fluid px-0 mb-3">
    {% for message in messages %}
    <div class="flash-message-wrapper mb-3">
      <div
        class="alert 
          {% if message.tags == 'error' %}
            flash-message-danger
          {% elif message.tags == 'success' %}
            flash-message-success
          {% elif message.tags == 'warning' %}
            flash-message-warning
          {% else %}
            flash-message-secondary
          {% endif %}
          text-center border-0 rounded-4 shadow-sm py-3 px-4 mb-3 flash-message"
        role="alert"
      >
        {{ message }}
      </div>
    </div>
    {% endfor %}
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const alerts = document.querySelectorAll('.flash-message-wrapper');

      alerts.forEach((alert, index) => {

        // APPEAR
        setTimeout(() => {
          alert.style.maxHeight = '200px';
          alert.style.opacity = '1';
          alert.style.transform = 'translateY(0)';
        }, 100 * index);

        // DISAPPEAR
        setTimeout(() => {
          alert.style.opacity = '0';
          alert.style.maxHeight = '0';
          alert.style.transform = 'translateY(-10px)';
          alert.style.margin = '0';
          alert.style.padding = '0';

          setTimeout(() => {
            alert.remove();
          }, 700);

        }, 6000 + (index * 400));

      });
    });
  </script>
{% endif %}
